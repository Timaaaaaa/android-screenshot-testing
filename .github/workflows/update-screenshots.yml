name: Update Screenshot Baselines

# Запускается вручную из GitHub Actions → выбери ветку → Run workflow
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    name: Record Screenshots on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Record screenshots
        run: ./gradlew testDebugUnitTest -Proborazzi.test.record=true -Proborazzi.test.verify=false

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/test/screenshots/
          if git diff --staged --quiet; then
            echo "Baselines unchanged — no commit needed"
          else
            git commit -m "chore: update screenshot baselines [skip ci]"
            git push
          fi
